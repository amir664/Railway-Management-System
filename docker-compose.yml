version: "3.9"

services:
  web_app:
    build: .
    container_name: web_app

    ports: 
     - "8080:6000"

    environment:
       DB_HOST: postgres
       DB_USERNAME: postgres
       DB_PASSWORD: postgres

    depends_on:
      - database
    restart: always  
    volumes:
    - .:/project  
      
  
  database:
     image: postgres:latest
     container_name: database
     
     environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: postgres
         POSTGRES_DB: postgres
         POSTGRES_DATABASE: postgres
         POSTGRES_PORT: "5432"
     volumes:
       - my-data:/var/lib/postgres/data

volumes:
   my-data:

     


 
